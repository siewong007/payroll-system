name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Catches newly published RUSTSEC/GHSA advisories on weeks with no push,
    # independent of code changes. Non-audit jobs skip on this trigger.
    - cron: "0 3 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Compile-time-checked sqlx queries (query!/query_as!) are verified against the
  # committed `.sqlx/` offline cache instead of a live database. Regenerate with
  # `cargo sqlx prepare` (needs a migrated DB) whenever a macro query changes.
  SQLX_OFFLINE: "true"

jobs:
  backend-lint:
    name: Backend Lint & Format
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master (2026-07)
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: backend
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  backend-test:
    name: Backend Tests
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:19beta2-alpine
        env:
          POSTGRES_DB: payroll_db_test
          POSTGRES_USER: payroll
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U payroll"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://payroll:test_password@localhost:5432/payroll_db_test
      JWT_SECRET: ci-test-secret-not-for-production
      JWT_EXPIRY_HOURS: "1"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master (2026-07)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: backend
      - name: Check sqlx offline cache is up to date
        # Runs live against DATABASE_URL regardless of SQLX_OFFLINE, so a query
        # added/changed without `cargo sqlx prepare` fails here with one clear
        # message instead of cascading "no cached data for this query" errors.
        run: cargo sqlx prepare --check
      - run: cargo test

  backend-docker:
    name: Backend Docker Build
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build linux/amd64 backend image
        run: |
          docker build \
            --platform linux/amd64 \
            --tag payroll-backend:ci \
            --file infra/Dockerfile \
            .

  backend-audit:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: backend
          # sqlx-macros-core locks optional MySQL support, which pulls rsa,
          # but this backend resolves Postgres-only SQLx features.
          # printpdf 0.10 pins lopdf 0.39. RUSTSEC-2026-0187 only affects
          # parsing untrusted PDFs; this application uses printpdf for
          # document generation and never calls lopdf's load entry points.
          # Re-review both ignores at least quarterly (next: 2026-10).
          ignore: RUSTSEC-2023-0071,RUSTSEC-2026-0187

  frontend-lint:
    name: Frontend Lint & Type Check
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: frontend/package.json
      - run: bun ci
      - run: bun run lint
      - run: bun run test
      - run: bun run typecheck

  frontend-build:
    name: Frontend Build
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: frontend/package.json
      - run: bun ci
      - run: bun run build

  frontend-audit:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: frontend/package.json
      - run: bun ci
      - run: bun audit --audit-level=high
