name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  FRONTEND_BUCKET: payroll-dev-frontend
  CLOUDFRONT_DISTRIBUTION_ID: ED4843A8VKOA2
  VITE_API_URL: https://api.payrollmy.com/api

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: frontend/package.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::371726673750:role/payroll-dev-cicd
          role-session-name: github-actions-frontend-deploy
          mask-aws-account-id: true
          audience: sts.amazonaws.com
          aws-region: ${{ env.AWS_REGION }}

      - name: Build frontend
        working-directory: frontend
        run: |
          bun ci
          bun run build

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist/ s3://$FRONTEND_BUCKET \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://$FRONTEND_BUCKET/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/index.html"
