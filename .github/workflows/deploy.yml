name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::371726673750:role/payroll-dev-cicd
          role-session-name: github-actions-backend-deploy
          mask-aws-account-id: true
          audience: sts.amazonaws.com
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Fetch Infrastructure Details
        id: infra
        working-directory: infra
        run: |
          terraform init
          echo "ECR_REPOSITORY=$(terraform output -raw ecr_repository_url | cut -d'/' -f2)" >> $GITHUB_OUTPUT
          echo "ECR_REGISTRY=$(terraform output -raw ecr_repository_url | cut -d'/' -f1)" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.infra.outputs.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ steps.infra.outputs.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f infra/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update Backend Deployment
        run: |
          # This project uses SSM to trigger a redeploy on the EC2 instance
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Name,Values=payroll-dev-backend" \
            --parameters 'commands=["/opt/deploy.sh"]' \
            --comment "Redeploying backend via CI/CD"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::371726673750:role/payroll-dev-cicd
          role-session-name: github-actions-frontend-deploy
          mask-aws-account-id: true
          audience: sts.amazonaws.com
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Fetch Infrastructure Details
        id: infra
        working-directory: infra
        run: |
          terraform init
          echo "FRONTEND_BUCKET=$(terraform output -raw frontend_bucket)" >> $GITHUB_OUTPUT
          echo "DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "API_URL=$(terraform output -raw api_url)" >> $GITHUB_OUTPUT

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ steps.infra.outputs.API_URL }}
        run: |
          npm ci
          npm run build

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.infra.outputs.FRONTEND_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "favicon.svg"
          aws s3 cp frontend/dist/index.html s3://${{ steps.infra.outputs.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
          aws s3 cp frontend/dist/favicon.svg s3://${{ steps.infra.outputs.FRONTEND_BUCKET }}/favicon.svg \
            --cache-control "public, max-age=86400"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.infra.outputs.DISTRIBUTION_ID }} \
            --paths "/index.html"
