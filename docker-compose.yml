services:
  db:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payroll_db}
      POSTGRES_USER: ${POSTGRES_USER:-payroll}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payroll} -d ${POSTGRES_DB:-payroll_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
